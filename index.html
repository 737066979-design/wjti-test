<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无尽冬日玩家人格测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #dcedc8 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}
.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding-bottom: 40px;
}
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 32px 24px;
  margin-bottom: 16px;
}

/* 首页 */
#page-home { text-align: center; }
#page-home h1 {
  font-size: 28px;
  font-weight: 800;
  color: #2e3a2e;
  line-height: 1.4;
  margin-bottom: 8px;
}
#page-home .subtitle {
  font-size: 15px;
  color: #6b7b6b;
  margin-bottom: 32px;
  line-height: 1.6;
}
.btn-start {
  display: inline-block;
  background: #4a6741;
  color: #fff;
  border: none;
  padding: 14px 48px;
  font-size: 17px;
  font-weight: 600;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-start:hover { background: #3d5636; transform: scale(1.02); }
.btn-start:active { transform: scale(0.98); }
.home-footer {
  margin-top: 28px;
  font-size: 13px;
  color: #999;
  line-height: 1.8;
}

/* 答题页 */
#page-quiz { display: none; }
.progress-bar {
  background: #e8f0e8;
  border-radius: 8px;
  height: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #66bb6a, #43a047);
  border-radius: 8px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text {
  text-align: right;
  font-size: 13px;
  color: #999;
  margin-bottom: 20px;
}
.question-card {
  background: #fafcfa;
  border: 1px solid #e8f0e8;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.question-num {
  display: inline-block;
  background: #e8f5e9;
  color: #4a6741;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
}
.question-text {
  font-size: 16px;
  font-weight: 500;
  color: #2e3a2e;
  line-height: 1.6;
  margin-bottom: 16px;
}
.option {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1.5px solid #e0e8e0;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.option:hover { border-color: #66bb6a; background: #f5faf5; }
.option.selected { border-color: #43a047; background: #e8f5e9; }
.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: #888;
  margin-right: 12px;
  flex-shrink: 0;
  transition: all 0.2s;
}
.option.selected .option-letter {
  border-color: #43a047;
  background: #43a047;
  color: #fff;
}
.option-text { font-size: 15px; color: #333; }

.btn-next {
  display: block;
  width: 100%;
  background: #4a6741;
  color: #fff;
  border: none;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.btn-next:disabled { background: #bbb; cursor: not-allowed; }
.btn-next:not(:disabled):hover { background: #3d5636; }

/* 结果页 */
#page-result { display: none; }
.result-header {
  text-align: center;
  margin-bottom: 8px;
}
.result-label {
  font-size: 14px;
  color: #888;
  margin-bottom: 8px;
}
.result-type-name {
  font-size: 36px;
  font-weight: 900;
  color: #2e3a2e;
  margin-bottom: 4px;
}
.result-type-code {
  font-size: 22px;
  font-weight: 700;
  color: #4a6741;
  margin-bottom: 16px;
}
.result-match {
  display: inline-block;
  background: #e8f5e9;
  color: #2e7d32;
  font-size: 13px;
  font-weight: 600;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
}
.result-desc-title {
  font-size: 15px;
  font-weight: 700;
  color: #2e3a2e;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
}
.result-desc {
  font-size: 14px;
  color: #555;
  line-height: 1.8;
  margin-bottom: 4px;
}
.score-section-title {
  font-size: 15px;
  font-weight: 700;
  color: #2e3a2e;
  margin-bottom: 16px;
}
.score-item {
  margin-bottom: 14px;
}
.score-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}
.score-name { font-size: 13px; color: #555; font-weight: 600; }
.score-value { font-size: 13px; color: #4a6741; font-weight: 700; }
.score-bar {
  height: 8px;
  background: #e8f0e8;
  border-radius: 4px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #81c784, #43a047);
  border-radius: 4px;
  transition: width 0.6s ease;
}
.score-bar-fill.low { background: linear-gradient(90deg, #ffcc80, #ffa726); }
.score-bar-fill.mid { background: linear-gradient(90deg, #81c784, #66bb6a); }
.score-bar-fill.high { background: linear-gradient(90deg, #43a047, #2e7d32); }

.btn-restart {
  display: block;
  width: 100%;
  background: #4a6741;
  color: #fff;
  border: none;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-restart:hover { background: #3d5636; }
.btn-share {
  display: block;
  width: 100%;
  background: #fff;
  color: #4a6741;
  border: 2px solid #4a6741;
  padding: 12px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
}
.btn-share:hover { background: #f5faf5; }

.top3-list { margin-bottom: 0; }
.top3-item {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}
.top3-item:last-child { border-bottom: none; }
.top3-rank {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  margin-right: 12px;
  flex-shrink: 0;
}
.top3-rank.r1 { background: #ffc107; }
.top3-rank.r2 { background: #90a4ae; }
.top3-rank.r3 { background: #bc8f6f; }
.top3-name { font-size: 14px; color: #333; flex: 1; }
.top3-score { font-size: 13px; color: #4a6741; font-weight: 700; }

/* 动画 */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease; }
</style>
</head>
<body>
<div class="container">

  <!-- 首页 -->
  <div id="page-home" class="card fade-in">
    <h1>你在无尽冬日里<br>是什么人格？</h1>
    <p class="subtitle">16种玩家人格，50道题库随机抽20题<br>测测你在末日里的真实面目</p>
    <button class="btn-start" onclick="startQuiz()">开始测试</button>
    <div class="home-footer">
      基于无尽冬日玩家社区生态设计<br>
      纯属娱乐 请勿上头
    </div>
  </div>

  <!-- 答题页 -->
  <div id="page-quiz">
    <div class="card">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text"><span id="progressText">0 / 20</span></div>
      <div id="questionArea"></div>
      <button class="btn-next" id="btnNext" disabled onclick="nextQuestion()">下一题</button>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="page-result">
    <div class="card fade-in" id="resultCard"></div>
    <div class="card fade-in" id="scoreCard"></div>
    <div class="card fade-in" id="top3Card"></div>
    <div class="card fade-in">
      <button class="btn-share" onclick="shareResult()">分享结果</button>
      <button class="btn-restart" onclick="restart()">重新测试</button>
    </div>
  </div>

</div>

<script>
// ========== 16种玩家类型 ==========
const TYPES = {
  argue: {
    name: "嗯炮强领主", code: "爱吵架",
    desc: "嘴炮天花板，输出全靠吼，在无尽冬日生存全凭一张嘴。你的战斗力也许不是最强的，但你的发言永远是最响的。世界频道就是你的舞台，每一次对线都是一场即兴脱口秀。别人打架靠部队，你打架靠嘴。"
  },
  gossip: {
    name: "村头条情报处主任", code: "爱吃瓜",
    desc: "全服第一八卦通，哪个联盟撕逼、哪个大佬冲榜、哪个主播谈恋爱，比当事人还清楚。你的消息来源遍布全服，情报网络堪比CIA。你不一定参与战斗，但每一场战斗的前因后果你都门儿清。"
  },
  cp: {
    name: "恋爱大师", code: "爱处CP",
    desc: "世界频道能看到你的身影，到处cpdd，不关心联盟里纷纷扰扰和未来发展，只想处cp，看到漂亮妹妹或腹肌帅哥走不动道。你眼中的末日世界不是废土，是大型相亲现场。"
  },
  fight: {
    name: "战争贩子", code: "爱打架",
    desc: "精力旺盛的战斗狂魔，上线只为找人激情互殴，打不打得赢不重要，能动手绝不废话。你的快乐很简单——看到红点就想点，看到城就想烧。和平？和平是什么？能吃吗？"
  },
  hoard: {
    name: "屯鼠", code: "爱囤物资",
    desc: "把游戏玩成双十一国货人，看着仓库一格填满比打架还爽，属于囤完就有安全感的类型。你的资源多到溢出来，但你就是舍不得用。末日里什么最重要？当然是物资安全感！"
  },
  farm: {
    name: "陶渊明", code: "爱种田",
    desc: "采菊东篱下，悠然见冰原。自带归隐气质，一心种田，主打安稳度日。别人在打仗，你在种地；别人在吵架，你在浇水。你用行动证明了末日也可以岁月静好。"
  },
  spend: {
    name: "撒币大师", code: "爱撒钱",
    desc: "花钱从不抠搜，资源从不吝啬，主打一个豪爽大气。动不动就给联盟家人发红包，给大伙开仓放粮，国战报销军费。你不是在撒钱，你是在撒快乐。全服都想跟你做朋友。"
  },
  grind: {
    name: "肝帝", code: "爱肝",
    desc: "你的日活数据一个人拉高了整个服务器的平均值。零点上线零点下线，盟友怀疑你有三个人轮班。你的手机长年插着充电线，你的眼圈比矿子烧的煤还黑。你已经和这个游戏融为一体了。"
  },
  teach: {
    name: "课代表", code: "爱发教程",
    desc: "稀有的WJTI人格，全服行走的攻略百科，新活动新玩法研究得明明白白，热衷于整理干货、分享技巧，谁有不懂问他一句，直接给你讲得通透又好懂。你是服里的灯塔，照亮萌新前行的路。"
  },
  zen: {
    name: "什么都与我无关", code: "佛系玩家",
    desc: "随缘上线，佛系发育，不追排名不惹是非，安安静静做个透明人。你不是不在乎，你只是看透了。联盟吵架你不参与，国战打响你随缘去，排名掉了你无所谓。你是末日里的一股清流。"
  },
  manage: {
    name: "牛马", code: "联盟管理",
    desc: "没错无尽冬日天选打工人就是你了，别人在睡觉你在铺旗子，别人在cpdd你在给盟友发资源，每次国战跟对面谈和、分配区里资源、分配车头车身，大小事务都离不开你。你是联盟的脊梁骨。"
  },
  boss: {
    name: "全盟霸总", code: "车头/霸总",
    desc: "你不是盟主但你比盟主还像盟主。你上线的方式不是签到，是巡视。你的战力是全盟第一梯队，你的发言是全盟最终解释权。你说打谁就打谁，你说几点集合没人敢迟到。你是暴风雪里最大的那棵树——所有人都在你后面躲风。"
  },
  whale: {
    name: "印钞机", code: "金球/大R",
    desc: "超超超稀有的WJTI人格，氪金对于你来说已经不是多少的问题，而是哪里有需要哪里就有你。你上线不是来打游戏的，是来发资源的。你的背包是联盟的公共金库，你的钱包撑起了整个王国的战力天花板。"
  },
  tech: {
    name: "六边形战士", code: "技术玩家",
    desc: "全维度拉满，六边形无短板，拥有超强的游戏理解、游戏操作、策略思维和指挥能力。兵工厂、燃霜、国战、霜龙你战无不胜，你已经把TA的隐藏机制、最优搭配、伤害期望值全算明白了发在群里了。"
  },
  backseat: {
    name: "赛后诸葛亮", code: "嘴硬",
    desc: "你从不在战前发言，但战后复盘你永远第一个跳出来。\"我早就说了应该先打这里\"\"当时要是听我的早赢了\"——一问题是你当时什么都没说。你的语言条永远在结算页面之后才出现，你是联盟里的马后炮之王。"
  },
  alarm: {
    name: "人形报警器", code: "报警器",
    desc: "打架不一定行，但摇人速度永远第一。一挨打立刻全频道呼救，主打一个人多力量大。\"救命！有人打我！坐标XXX！\"是你的日常台词。你是全服最高效的预警系统，没有之一。"
  }
};

// ========== 50道题库 ==========
const ALL_QUESTIONS = [
  {
    q: "世界频道有人在吵架，你的第一反应是？",
    opts: [
      { text: "立刻加入战场，用嘴把对面说到自闭", scores: { argue: 3 } },
      { text: "搬好小板凳，默默截图存档", scores: { gossip: 3 } },
      { text: "完全无视，继续做自己的事", scores: { zen: 3 } }
    ]
  },
  {
    q: "联盟被敌对联盟偷袭了，你会？",
    opts: [
      { text: "第一时间在频道发坐标喊人来救", scores: { alarm: 3 } },
      { text: "默默集结部队开始反击", scores: { fight: 3 } },
      { text: "打开联盟群看看大家什么反应", scores: { gossip: 2, zen: 1 } }

  {
    q: "你获得了一大批资源奖励，你会？",

      { text: "给联盟的兄弟们分一分", scores: { spend: 3 } },
      { text: "该用就用，该花就花", scores: { zen: 1, grind: 2 } }
    ]
  },
  {
    q: "新版本更新了一个复杂的新玩法，你会？",
    opts: [
      { text: "第一时间研究透彻，然后写攻略分享给大家", scores: { teach: 3 } },
      { text: "自己默默研究出最优解", scores: { tech: 3 } },
      { text: "等别人出攻略了再看", scores: { zen: 2, gossip: 1 } }
    ]
  },
  {
    q: "有人在联盟群里CPDD，你的反应？",
    opts: [
      { text: "我也CPDD！有没有人处对象！", scores: { cp: 3 } },

  {

  {

      { text: "再也见不到盟友们了", scores: { manage: 1, cp: 2 } },

  {
    q: "你对联盟管理事务的态度是？",
    opts: [
      { text: "我就是那个干活的人", scores: { manage: 3 } },
      { text: "有人管就行，我负责打架", scores: { fight: 2, boss: 1 } },
      { text: "管理是什么？能吃吗？", scores: { zen: 2, farm: 1 } }
    ]
  },
  {

      { text: "丢一句\"自己百度\"", scores: { argue: 1, zen: 2 } },

  {

  {

      { text: "精彩！截图收藏", scores: { gossip: 3 } }
    ]

// ========== 维度定义 ==========
const DIMENSIONS = [
  { key: "social", name: "社交活跃度", types: ["argue", "gossip", "cp", "alarm"], icon: "💬" },
  { key: "combat", name: "战斗倾向", types: ["fight", "boss", "alarm"], icon: "⚔️" },
  { key: "resource", name: "资源执着度", types: ["hoard", "spend", "whale"], icon: "💰" },
  { key: "dedication", name: "肝度", types: ["grind", "tech", "manage"], icon: "🔥" },
  { key: "leadership", name: "领导力", types: ["boss", "manage", "teach"], icon: "👑" },
  { key: "chill", name: "佛系指数", types: ["zen", "farm"], icon: "🧘" }
];

// ========== 游戏逻辑 ==========
let currentQuestions = [];
let currentIndex = 0;
let scores = {};
let selectedOption = -1;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  // 随机抽20题
  currentQuestions = shuffle(ALL_QUESTIONS).slice(0, 20);
  currentIndex = 0;
  scores = {};
  Object.keys(TYPES).forEach(k => scores[k] = 0);
  selectedOption = -1;

  document.getElementById("page-home").style.display = "none";
  document.getElementById("page-quiz").style.display = "block";
  document.getElementById("page-result").style.display = "none";

  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const area = document.getElementById("questionArea");
  const letters = ["A", "B", "C"];

  let html = `<div class="question-card fade-in">
    <span class="question-num">第 ${currentIndex + 1} 题</span>
    <div class="question-text">${q.q}</div>`;

  q.opts.forEach((opt, i) => {
    html += `<div class="option" onclick="selectOption(${i})" id="opt-${i}">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt.text}</div>
    </div>`;
  });

  html += `</div>`;
  area.innerHTML = html;

  selectedOption = -1;
  document.getElementById("btnNext").disabled = true;
  document.getElementById("btnNext").textContent = currentIndex === 19 ? "查看结果" : "下一题";

  // 更新进度
  const pct = (currentIndex / 20) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${currentIndex} / 20`;
}

function selectOption(idx) {
  selectedOption = idx;
  document.querySelectorAll(".option").forEach((el, i) => {
    el.classList.toggle("selected", i === idx);
  });
  document.getElementById("btnNext").disabled = false;
}

function nextQuestion() {
  if (selectedOption < 0) return;

  // 计分
  const q = currentQuestions[currentIndex];
  const chosen = q.opts[selectedOption];
  Object.entries(chosen.scores).forEach(([type, val]) => {
    scores[type] = (scores[type] || 0) + val;
  });

  currentIndex++;
  if (currentIndex >= 20) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById("page-quiz").style.display = "none";
  document.getElementById("page-result").style.display = "block";

  // 计算结果
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topType = sorted[0][0];
  const topScore = sorted[0][1];
  const maxPossible = 20 * 3; // 理论最高分
  const matchPct = Math.min(95, Math.max(55, Math.round((topScore / Math.max(maxPossible * 0.3, 1)) * 100)));
  const typeInfo = TYPES[topType];

  // 结果卡片
  document.getElementById("resultCard").innerHTML = `
    <div class="result-header">
      <div class="result-label">你的无尽冬日人格是：</div>
      <div class="result-type-name">${typeInfo.name}</div>
      <div class="result-type-code">${typeInfo.code}</div>
      <div class="result-match">匹配度 ${matchPct}%</div>
    </div>
    <div class="result-desc-title">人格解读</div>
    <div class="result-desc">${typeInfo.desc}</div>
  `;

  // 维度评分卡片
  let dimHtml = `<div class="score-section-title">六维评分</div>`;
  DIMENSIONS.forEach(dim => {
    let dimScore = 0;
    dim.types.forEach(t => dimScore += (scores[t] || 0));
    const maxDim = 20 * 3 * dim.types.length * 0.25;
    const pct = Math.min(100, Math.round((dimScore / Math.max(maxDim, 1)) * 100));
    const level = pct >= 70 ? "high" : pct >= 40 ? "mid" : "low";
    const label = pct >= 70 ? "高" : pct >= 40 ? "中" : "低";

    dimHtml += `<div class="score-item">
      <div class="score-label">
        <span class="score-name">${dim.icon} ${dim.name}</span>
        <span class="score-value">${label}</span>
      </div>
      <div class="score-bar">
        <div class="score-bar-fill ${level}" style="width: ${pct}%"></div>
      </div>
    </div>`;
  });
  document.getElementById("scoreCard").innerHTML = dimHtml;

  // Top 3 卡片
  const top3 = sorted.slice(0, 3);
  let top3Html = `<div class="score-section-title">最匹配 TOP 3</div><div class="top3-list">`;
  top3.forEach(([type, score], i) => {
    const info = TYPES[type];
    top3Html += `<div class="top3-item">
      <div class="top3-rank r${i + 1}">${i + 1}</div>
      <div class="top3-name">${info.name}（${info.code}）</div>
      <div class="top3-score">${score}分</div>
    </div>`;
  });
  top3Html += `</div>`;
  document.getElementById("top3Card").innerHTML = top3Html;

  // 进度条满
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("progressText").textContent = "20 / 20";
}

function shareResult() {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topType = sorted[0][0];
  const typeInfo = TYPES[topType];
  const text = `我在「无尽冬日玩家人格测试」中测出的人格是：${typeInfo.name}（${typeInfo.code}）！快来测测你是什么类型！`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert("结果已复制到剪贴板，快去分享给朋友吧！");
    }).catch(() => {
      prompt("复制以下文字分享给朋友：", text);
    });
  } else {
    prompt("复制以下文字分享给朋友：", text);
  }
}

function restart() {
  document.getElementById("page-home").style.display = "block";
  document.getElementById("page-quiz").style.display = "none";
  document.getElementById("page-result").style.display = "none";
  window.scrollTo(0, 0);
}
