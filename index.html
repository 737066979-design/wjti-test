<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WJTI 无尽冬日人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#e8ede5;color:#333;min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:16px}

/* ===== 首页 ===== */
.page{display:none}.page.active{display:block}
.home-card{background:#fff;border-radius:20px;padding:50px 28px 40px;text-align:center;margin-top:30px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.home-card h1{font-size:28px;font-weight:800;color:#222;line-height:1.4;margin-bottom:24px}
.btn-start{display:inline-block;background:#4a5e4a;color:#fff;border:none;border-radius:12px;padding:14px 44px;font-size:17px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-start:hover{background:#3d4f3d;transform:translateY(-1px)}
.home-footer{margin-top:28px;font-size:13px;color:#999;line-height:1.8}
.home-footer a{color:#4a5e4a}

/* ===== 答题页 ===== */
.quiz-card{background:#fff;border-radius:20px;padding:24px 20px 32px;margin-top:12px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.prog-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.prog-bar{flex:1;height:6px;background:#e8ede5;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#4a5e4a;border-radius:3px;transition:width .3s}
.prog-text{font-size:13px;color:#999;white-space:nowrap}

.q-block{border:1.5px solid #eee;border-radius:14px;padding:20px 18px;margin-bottom:16px;transition:border-color .3s}
.q-block.answered{border-color:#c5d6c5}
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{display:inline-block;background:#e8ede5;color:#4a5e4a;font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px}
.q-dim{font-size:12px;color:#bbb}
.q-text{font-size:15px;font-weight:600;line-height:1.6;margin-bottom:16px;color:#222}

.opt-list{display:flex;flex-direction:column;gap:10px}
.opt-item{display:flex;align-items:center;gap:10px;border:1.5px solid #e8e8e8;border-radius:12px;padding:13px 14px;cursor:pointer;transition:all .2s;font-size:14px;color:#444;line-height:1.5}
.opt-item:hover{border-color:#b5c9b5;background:#f7faf7}
.opt-item.selected{border-color:#4a5e4a;background:#f0f5f0}
.opt-radio{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.opt-item.selected .opt-radio{border-color:#4a5e4a;background:#4a5e4a}
.opt-item.selected .opt-radio::after{content:"";width:8px;height:8px;background:#fff;border-radius:50%}
.opt-letter{font-weight:700;color:#4a5e4a;flex-shrink:0}
.opt-content{flex:1}

.btn-submit{display:block;width:100%;background:#4a5e4a;color:#fff;border:none;border-radius:12px;padding:15px 0;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-submit:hover{background:#3d4f3d}
.btn-submit:disabled{background:#ccc;cursor:not-allowed}

/* ===== 结果页 ===== */
.result-top{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;margin-top:12px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.r-label{font-size:14px;color:#999;margin-bottom:6px}
.r-title{font-size:32px;font-weight:800;color:#222;margin-bottom:4px}
.r-avatars{display:flex;justify-content:center;align-items:center;gap:12px;margin:16px 0}
.r-ava{width:120px;height:120px}
.r-ava img{width:100%;height:100%;object-fit:contain}
.r-times{font-size:28px;font-weight:800;color:#ccc}
.r-quote{font-size:13px;color:#999;font-style:italic}
.ri-tag{font-size:12px;color:#fff;background:#4a5e4a;display:inline-block;padding:3px 12px;border-radius:20px;margin-bottom:8px}

.result-info{background:#fff;border-radius:20px;padding:24px;margin-top:12px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.ri-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ri-name{font-size:22px;font-weight:800;color:#222;margin-bottom:8px}
.ri-badge{display:inline-block;background:#e8ede5;color:#4a5e4a;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:14px}
.ri-desc{font-size:14px;color:#666;line-height:1.9}

.result-detail{background:#fff;border-radius:20px;padding:24px;margin-top:12px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.rd-title{font-size:15px;font-weight:700;color:#222;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px}
.bar-name{width:100px;text-align:right;color:#666;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden}
.bar-val{height:100%;border-radius:5px;transition:width .8s}
.bar-pct{width:36px;color:#999;font-size:12px}


.btn-row{text-align:center;margin:24px 0 40px}
.btn-restart{background:transparent;border:2px solid #4a5e4a;color:#4a5e4a;border-radius:12px;padding:13px 44px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-restart:hover{background:#4a5e4a;color:#fff}

.tip-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4a5e4a;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;z-index:99;display:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}
</style>
</head>
<body>
<div class="wrap">
  <!-- 首页 -->
  <div class="page active" id="pageHome">
    <div class="home-card">
      <h1>SBTI已经过时，<br>WJTI来了。</h1>
      <button class="btn-start" onclick="startQuiz()">开始测试</button>
      <div class="home-footer">
        无尽冬日玩家人格测试<br>
        从50道题库中随机抽取20题<br>
        每次测试都是全新体验
      </div>
    </div>
  </div>

  <!-- 答题页 -->
  <div class="page" id="pageQuiz">
    <div class="quiz-card">
      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        <div class="prog-text" id="progText">0 / 20</div>
      </div>

    </div>
  </div>

  <!-- 结果页 -->
  <div class="page" id="pageResult">
    <div class="result-top">
      <div class="r-label">你的组合人格是：</div>

      <div class="r-avatars" id="rAvatars"></div>
      <div class="r-quote" id="rQuote"></div>
    </div>
    <div class="result-info">
      <div class="ri-tag" id="riTag1">社区人格</div>
      <div class="ri-name" id="riName1"></div>
      <div class="ri-badge" id="riBadge1"></div>
      <div class="ri-desc" id="riDesc1"></div>
    </div>
    <div class="result-info">
      <div class="ri-tag" id="riTag2">角色人格</div>
      <div class="ri-name" id="riName2"></div>
      <div class="ri-badge" id="riBadge2"></div>
      <div class="ri-desc" id="riDesc2"></div>
    </div>
    <div class="result-detail">
      <div class="rd-title">社区向维度分布</div>
      <div id="rBarsC"></div>
    </div>
    <div class="result-detail">
      <div class="rd-title">角色向维度分布</div>
      <div id="rBarsR"></div>
    </div>
    <div class="btn-row">
      <button class="btn-restart" onclick="restart()">重新测试</button>
    </div>
  </div>
</div>
<div class="tip-toast" id="tipToast"></div>

/* ========== 逻辑 ========== */
const TOTAL=20;
let picked=[];
let answers={};

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}

function startQuiz(){
  const cPicked=shuffle(communityBank).slice(0,10).map(q=>({...q,_type:'c'}));
  const rPicked=shuffle(roleBank).slice(0,10).map(q=>({...q,_type:'r'}));
  picked=[...cPicked,...rPicked];
  answers={};
  renderQuestions();
  showPage('pageQuiz');
  updateProgress();
}

function renderQuestions(){
  const c=document.getElementById('questionsContainer');
  c.innerHTML='';
  picked.forEach((q,i)=>{
    const opts=shuffle(q.o);
    const letters=['A','B','C','D','E'];
    let optsHtml=opts.map((o,j)=>`
      <div class="opt-item" data-qi="${i}" data-oi="${j}" data-k="${o.k}" onclick="selectOpt(this)">
        <div class="opt-radio"></div>
        <span class="opt-letter">${letters[j]}</span>
        <span class="opt-content">${o.t}</span>
      </div>`).join('');
    c.innerHTML+=`
      <div class="q-block" id="qb${i}">
        <div class="q-head">
          <span class="q-num">第 ${i+1} 题</span>
          <span class="q-dim">维度已隐藏</span>
        </div>
        <div class="q-text">${q.q}</div>
        <div class="opt-list">${optsHtml}</div>
      </div>`;
  });
}

function selectOpt(el){
  const qi=el.dataset.qi;
  const k=el.dataset.k;
  // 清除同题其他选中
  document.querySelectorAll(`.opt-item[data-qi="${qi}"]`).forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  answers[qi]=k;
  document.getElementById('qb'+qi).classList.add('answered');
  updateProgress();
}

function updateProgress(){
  const n=Object.keys(answers).length;
  document.getElementById('progText').textContent=`${n} / ${TOTAL}`;
  document.getElementById('progFill').style.width=`${(n/TOTAL)*100}%`;
  document.getElementById('btnSubmit').disabled=(n<TOTAL);
}

function toast(msg){
  const t=document.getElementById('tipToast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>{t.style.display='none'},2000);
}

function submitQuiz(){
  if(Object.keys(answers).length<TOTAL){toast('请回答完所有题目');return}
  // 分开统计社区向和角色向
  const cScores={},rScores={};
  Object.entries(answers).forEach(([qi,k])=>{
    if(picked[qi]._type==='c') cScores[k]=(cScores[k]||0)+1;
    else rScores[k]=(rScores[k]||0)+1;
  });
  const cSorted=Object.entries(cScores).sort((a,b)=>b[1]-a[1]);
  const rSorted=Object.entries(rScores).sort((a,b)=>b[1]-a[1]);
  let cTop=cSorted[0], rTop=rSorted[0];
  // 如果社区和角色都是同一人格（如佛系），角色取第二名；若角色无第二名则社区取第二名
  if(cTop[0]===rTop[0]){
    if(rSorted.length>1) rTop=rSorted[1];
    else if(cSorted.length>1) cTop=cSorted[1];
  }
  const cp=profiles[cTop[0]], rp=profiles[rTop[0]];
  if(!cp||!rp){toast('结果计算异常');return}

  // 顶部组合标题
  document.getElementById('rTitle').textContent=`无尽冬日${cp.title} × ${rp.title}`;
  document.getElementById('rAvatars').innerHTML=`
    <div class="r-ava"><img src="${cp.img}" alt="${cp.title}"></div>
    <span class="r-times">×</span>
    <div class="r-ava"><img src="${rp.img}" alt="${rp.title}"></div>`;
  document.getElementById('rQuote').textContent=`"${cp.quote}" + "${rp.quote}"`;

  // 社区人格卡片
  document.getElementById('riName1').textContent=`无尽冬日${cp.title}`;
  document.getElementById('riBadge1').textContent=`命中 ${cTop[1]}/10 题`;
  document.getElementById('riDesc1').textContent=cp.desc;

  // 角色人格卡片
  document.getElementById('riName2').textContent=`无尽冬日${rp.title}`;
  document.getElementById('riBadge2').textContent=`命中 ${rTop[1]}/10 题`;
  document.getElementById('riDesc2').textContent=rp.desc;

  // 柱状图
  const colors=['#4a5e4a','#6b8e6b','#8fbc8f','#b5d5b5','#d4e8d4','#e8e8e8'];
  function renderBars(sorted,total){
    return sorted.map(([name,count],i)=>{
      const pp=Math.round((count/total)*100);
      const pf=profiles[name];
      const label=pf?pf.title:name;
      return `<div class="bar-row">
        <span class="bar-name">${label}</span>
        <div class="bar-track"><div class="bar-val" style="width:${pp}%;background:${colors[i]||colors[5]}"></div></div>
        <span class="bar-pct">${pp}%</span>
      </div>`;
    }).join('');
  }
  document.getElementById('rBarsC').innerHTML=renderBars(cSorted,10);
  document.getElementById('rBarsR').innerHTML=renderBars(rSorted,10);

  showPage('pageResult');
}

function restart(){showPage('pageHome')}
