<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无尽冬日 WJTI 人格形象图 - 设计预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  color: #fff;
  padding: 40px 20px;
}
h1 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #a8edea, #fed6e3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 40px;
  font-size: 14px;
}
.category-title {
  font-size: 20px;
  font-weight: 700;
  margin: 40px 0 20px;
  padding-left: 12px;
  border-left: 4px solid #a8edea;
  color: #a8edea;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.char-card {
  background: #16213e;
  border-radius: 20px;
  padding: 24px 16px 20px;
  text-align: center;
  transition: transform 0.3s, box-shadow 0.3s;
  border: 1px solid rgba(255,255,255,0.05);
}
.char-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.char-avatar {
  width: 140px;
  height: 140px;
  margin: 0 auto 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.char-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  color: #fff;
}
.char-code {
  font-size: 13px;
  color: #888;
  margin-bottom: 8px;
}
.char-type-tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  color: #fff;
  opacity: 0.8;
}
</style>
</head>
<body>

<h1>WJTI 无尽冬日人格形象图</h1>
<p class="subtitle">参考 MBTI / SBTI 风格设计 | 共21种人格</p>

<div style="max-width:1200px;margin:0 auto;">

<div class="category-title">社区型人格</div>
<div class="gallery" id="communityGrid"></div>

<div class="category-title">角色型人格</div>
<div class="gallery" id="roleGrid"></div>

</div>

<script>
// ===== 21种人格定义 =====
const CHARACTERS = {

  },
  zen: {

  },
  // === 角色型 ===
  boss: {

    color: "#6a1b9a", bgGrad: ["#9c27b0", "#4a148c"],

};

// ===== SVG 角色生成器 =====
function createCharSVG(key) {
  const c = CHARACTERS[key];
  const g1 = c.bgGrad[0], g2 = c.bgGrad[1];

  // 通用头部模板
  const head = (skin = "#FFE0BD", hairColor = "#4a3728", expression = "normal") => {
    let eyes, mouth;
    switch(expression) {
      case "angry":
        eyes = `<line x1="52" y1="48" x2="58" y2="51" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="68" y1="48" x2="62" y2="51" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>`;
        mouth = `<path d="M55 62 Q60 58 65 62" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        break;
      case "happy":
        eyes = `<path d="M52 50 Q55 46 58 50" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M62 50 Q65 46 68 50" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
        mouth = `<path d="M54 60 Q60 67 66 60" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        break;
      case "wink":
        eyes = `<circle cx="55" cy="49" r="2.5" fill="#333"/>
                <path d="M62 50 Q65 46 68 50" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
        mouth = `<path d="M55 61 Q60 66 65 61" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        break;
      case "cool":
        eyes = `<rect x="49" y="46" width="12" height="5" rx="2.5" fill="#333"/>
                <rect x="63" y="46" width="12" height="5" rx="2.5" fill="#333"/>
                <line x1="61" y1="48.5" x2="63" y2="48.5" stroke="#333" stroke-width="1.5"/>`;
        mouth = `<line x1="56" y1="61" x2="64" y2="61" stroke="#333" stroke-width="2" stroke-linecap="round"/>`;
        break;
      case "sleepy":
        eyes = `<line x1="52" y1="50" x2="58" y2="50" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="62" y1="50" x2="68" y2="50" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>`;
        mouth = `<circle cx="60" cy="62" rx="3" ry="2.5" fill="#333" opacity="0.3"/>`;
        break;
      case "heart_eyes":
        eyes = `<path d="M52 48 L55 45 L58 48 L55 52 Z" fill="#e91e63"/>
                <path d="M62 48 L65 45 L68 48 L65 52 Z" fill="#e91e63"/>`;
        mouth = `<path d="M55 61 Q60 66 65 61" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        break;
      case "scared":
        eyes = `<circle cx="55" cy="49" r="3.5" fill="#fff" stroke="#333" stroke-width="1.5"/>
                <circle cx="55" cy="49" r="2" fill="#333"/>
                <circle cx="65" cy="49" r="3.5" fill="#fff" stroke="#333" stroke-width="1.5"/>
                <circle cx="65" cy="49" r="2" fill="#333"/>`;
        mouth = `<ellipse cx="60" cy="63" rx="4" ry="3" fill="#333"/>`;
        break;
      case "smirk":
        eyes = `<circle cx="55" cy="49" r="2.5" fill="#333"/>
                <circle cx="65" cy="49" r="2.5" fill="#333"/>`;
        mouth = `<path d="M55 61 Q58 61 62 59 Q66 57 68 59" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        break;
      case "blush":
        eyes = `<path d="M52 50 Q55 46 58 50" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M62 50 Q65 46 68 50" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
        mouth = `<path d="M56 61 Q60 65 64 61" stroke="#333" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                 <ellipse cx="48" cy="55" rx="5" ry="3" fill="#f48fb1" opacity="0.4"/>
                 <ellipse cx="72" cy="55" rx="5" ry="3" fill="#f48fb1" opacity="0.4"/>`;
        break;
      case "star_eyes":
        eyes = `<polygon points="55,45 56.5,48 59.5,48.5 57.5,51 58,54 55,52.5 52,54 52.5,51 50.5,48.5 53.5,48" fill="#ffd54f"/>
                <polygon points="65,45 66.5,48 69.5,48.5 67.5,51 68,54 65,52.5 62,54 62.5,51 60.5,48.5 63.5,48" fill="#ffd54f"/>`;
        mouth = `<path d="M55 61 Q60 67 65 61" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        break;
      case "calm":
        eyes = `<circle cx="55" cy="49" r="2" fill="#333"/>
                <circle cx="65" cy="49" r="2" fill="#333"/>`;
        mouth = `<path d="M56 61 Q60 63 64 61" stroke="#333" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
        break;
      case "determined":
        eyes = `<circle cx="55" cy="49" r="2.5" fill="#333"/>
                <circle cx="65" cy="49" r="2.5" fill="#333"/>
                <line x1="51" y1="44" x2="59" y2="46" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                <line x1="69" y1="44" x2="61" y2="46" stroke="#333" stroke-width="2" stroke-linecap="round"/>`;
        mouth = `<line x1="56" y1="62" x2="64" y2="62" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>`;
        break;
      default: // normal
        eyes = `<circle cx="55" cy="49" r="2.5" fill="#333"/>
                <circle cx="65" cy="49" r="2.5" fill="#333"/>`;
        mouth = `<path d="M56 61 Q60 64 64 61" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    }
    return `<circle cx="60" cy="52" r="22" fill="${skin}"/>
            ${eyes}
            ${mouth}`;
  };

  // 各角色独特SVG
  const svgMap = {
    argue: () => `
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="bg_argue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>
        <circle cx="60" cy="60" r="58" fill="url(#bg_argue)"/>
        <circle cx="60" cy="60" r="55" fill="url(#bg_argue)" opacity="0.5"/>
        <!-- body -->
        <rect x="42" y="72" width="36" height="30" rx="10" fill="#d32f2f"/>
        <!-- head -->
        ${head("#FFE0BD", "#4a3728", "angry")}
        <!-- hair - spiky -->
        <path d="M38 44 Q42 28 48 38 Q50 25 55 36 Q58 22 62 35 Q66 24 68 37 Q72 27 76 40 Q82 35 80 48" fill="#4a3728"/>

        <path d="M82 55 L100 45 L102 65 L82 60 Z" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/>
        <rect x="78" y="54" width="5" height="7" rx="1" fill="#ffd54f"/>
        <!-- speech lines -->
        <line x1="100" y1="48" x2="108" y2="44" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
        <line x1="102" y1="55" x2="112" y2="55" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="100" y1="62" x2="108" y2="66" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      </svg>`,

    gossip: () => `
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="bg_gossip" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>
        <circle cx="60" cy="60" r="58" fill="url(#bg_gossip)"/>
        <rect x="42" y="72" width="36" height="30" rx="10" fill="#1b5e20"/>
        ${head("#FFE0BD", "#333", "smirk")}
        <!-- beret hat -->
        <ellipse cx="60" cy="34" rx="22" ry="6" fill="#333"/>
        <ellipse cx="58" cy="33" rx="18" ry="10" fill="#333"/>
        <!-- watermelon -->
        <ellipse cx="28" cy="82" rx="14" ry="11" fill="#4caf50"/>
        <path d="M16 82 Q28 70 40 82" fill="#e53935"/>
        <circle cx="24" cy="78" r="1" fill="#333"/>
        <circle cx="28" cy="76" r="1" fill="#333"/>
        <circle cx="32" cy="78" r="1" fill="#333"/>
        <!-- magnifying glass -->
        <circle cx="92" cy="42" r="10" fill="none" stroke="#fff" stroke-width="3" opacity="0.7"/>
        <line x1="99" y1="49" x2="106" y2="56" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      </svg>`,

    cp: () => `
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="bg_cp" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>
        <circle cx="60" cy="60" r="58" fill="url(#bg_cp)"/>
        <rect x="42" y="72" width="36" height="30" rx="10" fill="#ad1457"/>
        ${head("#FFE0BD", "#5d4037", "heart_eyes")}
        <!-- long hair -->
        <path d="M38 40 Q36 55 34 75 Q36 76 40 72 L40 48 Z" fill="#5d4037"/>
        <path d="M82 40 Q84 55 86 75 Q84 76 80 72 L80 48 Z" fill="#5d4037"/>
        <path d="M38 40 Q40 28 50 30 Q55 24 60 28 Q65 24 70 30 Q80 28 82 40" fill="#5d4037"/>
        <!-- floating hearts -->
        <path d="M18 30 Q18 25 22 25 Q26 25 26 30 Q26 35 22 38 Q18 35 18 30Z" fill="#ff4081" opacity="0.8"/>
        <path d="M90 20 Q90 16 93 16 Q96 16 96 20 Q96 24 93 26 Q90 24 90 20Z" fill="#ff80ab" opacity="0.7"/>
        <path d="M95 68 Q95 64 98 64 Q101 64 101 68 Q101 72 98 74 Q95 72 95 68Z" fill="#f48fb1" opacity="0.6"/>
        <path d="M12 60 Q12 57 14.5 57 Q17 57 17 60 Q17 63 14.5 65 Q12 63 12 60Z" fill="#ff80ab" opacity="0.5"/>
      </svg>`,

    fight: () => `
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="bg_fight" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>
        <circle cx="60" cy="60" r="58" fill="url(#bg_fight)"/>
        <rect x="42" y="72" width="36" height="30" rx="10" fill="#bf360c"/>
        ${head("#FFE0BD", "#3e2723", "determined")}
        <!-- short spiky hair -->
        <path d="M40 42 Q44 26 52 36 Q56 22 60 34 Q64 22 68 36 Q76 26 80 42" fill="#3e2723"/>
        <!-- boxing gloves -->
        <circle cx="28" cy="78" r="11" fill="#f44336"/>
        <path d="M22 74 Q28 68 34 74" fill="#ef5350"/>
        <circle cx="92" cy="78" r="11" fill="#f44336"/>
        <path d="M86 74 Q92 68 98 74" fill="#ef5350"/>
        <!-- fire effect -->
        <path d="M14 38 Q18 28 20 38 Q22 28 24 40 Q20 42 16 40Z" fill="#ff9800" opacity="0.7"/>
        <path d="M96 34 Q100 24 102 34 Q104 24 106 36 Q102 38 98 36Z" fill="#ff9800" opacity="0.7"/>
        <!-- scar -->
        <line x1="70" y1="42" x2="74" y2="55" stroke="#e0a090" stroke-width="1.5" stroke-linecap="round"/>
      </svg>`,

    hoard: () => `
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="bg_hoard" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>
        <circle cx="60" cy="60" r="58" fill="url(#bg_hoard)"/>
        <rect x="42" y="72" width="36" height="30" rx="10" fill="#5d4037"/>
        ${head("#FFE0BD", "#4e342e", "happy")}
        <!-- hat -->
        <ellipse cx="60" cy="33" rx="24" ry="5" fill="#4e342e"/>
        <rect x="46" y="25" width="28" height="10" rx="4" fill="#4e342e"/>
        <!-- treasure chest -->
        <rect x="20" y="80" width="30" height="22" rx="4" fill="#8d6e63"/>
        <rect x="20" y="80" width="30" height="10" rx="4" fill="#a1887f"/>
        <rect x="32" y="84" width="6" height="6" rx="1" fill="#ffd54f"/>
        <!-- gold coins stack -->
        <ellipse cx="95" cy="92" rx="12" ry="5" fill="#f9a825"/>
        <ellipse cx="95" cy="88" rx="12" ry="5" fill="#fbc02d"/>
        <ellipse cx="95" cy="84" rx="12" ry="5" fill="#fdd835"/>
        <ellipse cx="95" cy="80" rx="10" ry="4" fill="#ffeb3b"/>
        <!-- sparkle -->
        <path d="M105 70 L107 66 L109 70 L105 70" fill="#fff" opacity="0.6"/>
      </svg>`,

    farm: () => `
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="bg_farm" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>
        <circle cx="60" cy="60" r="58" fill="url(#bg_farm)"/>
        <rect x="42" y="72" width="36" height="30" rx="10" fill="#388e3c"/>
        ${head("#FFE0BD", "#5d4037", "calm")}
        <!-- straw hat -->
        <ellipse cx="60" cy="33" rx="28" ry="6" fill="#ffe082"/>
        <path d="M42 33 Q46 18 60 16 Q74 18 78 33" fill="#ffd54f"/>
        <rect x="50" y="28" width="20" height="4" rx="2" fill="#f9a825"/>
        <!-- seedling -->
        <path d="M28 90 Q28 78 35 74 Q30 80 32 90" fill="#66bb6a" stroke="#4caf50" stroke-width="1"/>
        <ellipse cx="35" cy="73" rx="6" ry="4" fill="#81c784"/>
        <ellipse cx="28" cy="76" rx="5" ry="3.5" fill="#a5d6a7"/>
        <!-- butterfly -->
        <ellipse cx="96" cy="36" rx="5" ry="3" fill="#ffb74d" opacity="0.7" transform="rotate(-20 96 36)"/>
        <ellipse cx="92" cy="36" rx="5" ry="3" fill="#ff8a65" opacity="0.7" transform="rotate(20 92 36)"/>
        <circle cx="94" cy="37" r="1" fill="#5d4037"/>
      </svg>`,

    spend: () => `
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="bg_spend" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>

  return svgMap[key] ? svgMap[key]() : '';
}

// ===== 渲染画廊 =====
function renderGallery() {
  const communityGrid = document.getElementById('communityGrid');
  const roleGrid = document.getElementById('roleGrid');

  Object.entries(CHARACTERS).forEach(([key, char]) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.innerHTML = `
      <div class="char-avatar">${createCharSVG(key)}</div>
      <div class="char-name">${char.name}</div>
      <div class="char-code">${char.code}</div>
      <span class="char-type-tag" style="background:${char.color}">${char.category === 'community' ? '社区' : '角色'}</span>
    `;

    if (char.category === 'community') {
      communityGrid.appendChild(card);
    } else {
      roleGrid.appendChild(card);
    }
  });
}

renderGallery();
</script>
